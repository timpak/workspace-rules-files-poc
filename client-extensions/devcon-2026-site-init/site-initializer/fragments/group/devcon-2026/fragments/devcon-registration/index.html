<div class="devcon-reg-wrapper">
	<div class="devcon-reg-header">
		<span class="devcon-reg-badge">June 15–16, 2026 · San Francisco, CA</span>
		<h2 class="devcon-reg-title">Register for DevCon 2026</h2>
		<p class="devcon-reg-subtitle">Choose the sessions you want to attend and lock in your spot.</p>
	</div>
	<div class="devcon-reg-status" style="display:none"></div>
	<form class="devcon-reg-form" novalidate>
		<div class="devcon-reg-body">
			<div class="devcon-reg-personal">
				<h3 class="devcon-reg-section-title">Your Details</h3>
				<div class="devcon-reg-field">
					<label class="devcon-reg-label">Full Name</label>
					<input class="devcon-reg-input" name="attendeeName" type="text" placeholder="Jane Smith" required />
				</div>
				<div class="devcon-reg-field">
					<label class="devcon-reg-label">Email Address</label>
					<input class="devcon-reg-input" name="attendeeEmail" type="email" placeholder="jane@company.com" required />
				</div>
			</div>
			<div class="devcon-reg-sessions">
				<h3 class="devcon-reg-section-title">Select Sessions</h3>
				<div class="devcon-session-list"><p>Loading sessions…</p></div>
			</div>
		</div>
		<div class="devcon-reg-footer">
			<button class="devcon-reg-submit" type="submit">Complete Registration</button>
		</div>
	</form>
</div>
