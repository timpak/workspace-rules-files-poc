#
# MySQL
#
#jdbc.default.driverClassName=com.mysql.cj.jdbc.Driver
#jdbc.default.url=jdbc:mysql://localhost/lportal
#jdbc.default.username=root
#jdbc.default.password=

#
# BasicAuth verifier — required for headless REST and MCP (/o/* endpoints)
# Dev only — never enable on production
#
auth.verifier.BasicAuthHeaderAuthVerifier.urls.includes=/api/*,/xmlrpc/*,/o/*

#
# Skip first-login prompts — dev only
#
terms.of.use.required=false
passwords.default.policy.change.required=false

#
# Feature flags
#
feature.flag.LPD-63311=true